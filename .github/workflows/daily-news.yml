name: Daily Tiny Dream News

on:
  workflow_dispatch:
    inputs:
      run_date:
        description: "Run date in YYYY-MM-DD. Leave blank to use Hong Kong date."
        required: false
        type: string
      ai_mode:
        description: "AI mode for the daily pipeline."
        required: true
        default: mock
        type: choice
        options:
          - mock
          - real
      deploy:
        description: "Deploy to Cloudflare Pages after validation."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "15 0 * * *"

permissions:
  contents: read

concurrency:
  group: daily-tiny-dream-news
  cancel-in-progress: false

jobs:
  daily-news:
    name: Generate daily brief
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
      AI_MOCK_MODE: ${{ vars.AI_MOCK_MODE || 'true' }}
      DAILY_BRIEF_AI_MOCK_MODE: ${{ vars.DAILY_BRIEF_AI_MOCK_MODE || vars.AI_MOCK_MODE || 'true' }}
      AI_DAILY_BUDGET_NEURONS: ${{ vars.AI_DAILY_BUDGET_NEURONS }}
      AI_MAX_TOTAL_SUMMARIES: ${{ vars.AI_MAX_TOTAL_SUMMARIES }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_AI_MODEL: ${{ secrets.CLOUDFLARE_AI_MODEL }}
      CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
      ENABLE_CLOUDFLARE_DEPLOY: ${{ vars.ENABLE_CLOUDFLARE_DEPLOY || 'false' }}
      AUTO_CREATE_CLOUDFLARE_PROJECT: ${{ vars.AUTO_CREATE_CLOUDFLARE_PROJECT || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare run settings
        id: settings
        shell: bash
        env:
          MANUAL_RUN_DATE: ${{ inputs.run_date || '' }}
          MANUAL_AI_MODE: ${{ inputs.ai_mode || 'mock' }}
          MANUAL_DEPLOY: ${{ inputs.deploy || 'false' }}
          SCHEDULE_AI_MOCK_MODE: ${{ vars.AI_MOCK_MODE || 'true' }}
          SCHEDULE_DAILY_BRIEF_AI_MOCK_MODE: ${{ vars.DAILY_BRIEF_AI_MOCK_MODE || vars.AI_MOCK_MODE || 'true' }}
        run: |
          set -euo pipefail

          if [ -n "${MANUAL_RUN_DATE}" ]; then
            run_date="${MANUAL_RUN_DATE}"
          else
            run_date="$(TZ=Asia/Hong_Kong date +'%Y-%m-%d')"
          fi

          if ! [[ "${run_date}" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "::error::run_date must use YYYY-MM-DD format."
            exit 1
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            ai_mode="${MANUAL_AI_MODE}"
            deploy="${MANUAL_DEPLOY}"
          else
            if [ "${SCHEDULE_AI_MOCK_MODE}" = "false" ]; then
              ai_mode="real"
            else
              ai_mode="mock"
            fi
            deploy="false"
          fi

          if [ "${ENABLE_CLOUDFLARE_DEPLOY}" != "true" ]; then
            deploy="false"
            deploy_skip_reason="ENABLE_CLOUDFLARE_DEPLOY is not true"
          elif [ "${deploy}" != "true" ]; then
            deploy_skip_reason="workflow input deploy is not true"
          else
            deploy_skip_reason=""
          fi

          if [ "${ai_mode}" = "real" ]; then
            pipeline_ai_flag="--real-ai"
            echo "AI_MOCK_MODE=false" >> "$GITHUB_ENV"
            if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
              echo "DAILY_BRIEF_AI_MOCK_MODE=false" >> "$GITHUB_ENV"
            else
              echo "DAILY_BRIEF_AI_MOCK_MODE=${SCHEDULE_DAILY_BRIEF_AI_MOCK_MODE}" >> "$GITHUB_ENV"
            fi
          else
            pipeline_ai_flag="--mock-ai"
            echo "AI_MOCK_MODE=true" >> "$GITHUB_ENV"
            echo "DAILY_BRIEF_AI_MOCK_MODE=true" >> "$GITHUB_ENV"
          fi

          echo "RUN_DATE=${run_date}" >> "$GITHUB_ENV"
          echo "PIPELINE_AI_FLAG=${pipeline_ai_flag}" >> "$GITHUB_ENV"
          echo "EFFECTIVE_AI_MODE=${ai_mode}" >> "$GITHUB_ENV"
          echo "EFFECTIVE_DEPLOY=${deploy}" >> "$GITHUB_ENV"
          echo "DEPLOY_SKIP_REASON=${deploy_skip_reason}" >> "$GITHUB_ENV"

          echo "run_date=${run_date}" >> "$GITHUB_OUTPUT"
          echo "ai_mode=${ai_mode}" >> "$GITHUB_OUTPUT"
          echo "deploy=${deploy}" >> "$GITHUB_OUTPUT"

      - name: Run daily pipeline
        run: npm run pipeline -- --date "$RUN_DATE" "$PIPELINE_AI_FLAG"

      - name: Validate generated data
        run: npm run validate:pipeline -- --date "$RUN_DATE"

      - name: Build static website
        run: npm run build

      - name: Detect static output directory
        shell: bash
        run: |
          set -euo pipefail
          for output_dir in dist build out; do
            if [ -d "$output_dir" ]; then
              echo "BUILD_OUTPUT_DIR=${output_dir}" >> "$GITHUB_ENV"
              echo "Detected static output directory: ${output_dir}"
              exit 0
            fi
          done

          echo "::error::No supported static output directory found. Expected one of: dist, build, out."
          exit 1

      - name: Check Cloudflare deployment settings
        shell: bash
        run: |
          set -euo pipefail

          if [ "${EFFECTIVE_DEPLOY}" != "true" ]; then
            echo "::warning::Cloudflare deploy skipped because ${DEPLOY_SKIP_REASON:-deployment was not requested}."
            echo "DEPLOY_READY=false" >> "$GITHUB_ENV"
            exit 0
          fi

          missing=()
          [ -n "${CLOUDFLARE_ACCOUNT_ID}" ] || missing+=("CLOUDFLARE_ACCOUNT_ID")
          [ -n "${CLOUDFLARE_API_TOKEN}" ] || missing+=("CLOUDFLARE_API_TOKEN")
          [ -n "${CLOUDFLARE_PROJECT_NAME}" ] || missing+=("CLOUDFLARE_PROJECT_NAME")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::warning::Cloudflare Pages deployment skipped because required secret(s) are missing: ${missing[*]}"
            echo "DEPLOY_READY=false" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_READY=true" >> "$GITHUB_ENV"
          fi

      - name: Diagnose Cloudflare Pages project
        if: ${{ success() && env.EFFECTIVE_DEPLOY == 'true' && env.DEPLOY_READY == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          mask_value() {
            local value="$1"
            local length="${#value}"
            if [ "${length}" -le 10 ]; then
              echo "[set-but-short]"
            else
              echo "${value:0:6}...${value: -4}"
            fi
          }

          extract_project_names() {
            sed -nE 's/^[[:space:]]*Project Name:[[:space:]]*(.+)[[:space:]]*$/\1/p'
          }

          exact_project_match() {
            local expected="$1"
            grep -Fx -- "${expected}" >/dev/null
          }

          echo "Checking Cloudflare Pages project configuration."
          echo "Configured Pages project: ${CLOUDFLARE_PROJECT_NAME}"
          echo "Configured Cloudflare account: $(mask_value "${CLOUDFLARE_ACCOUNT_ID}")"

          echo "Listing accessible Cloudflare Pages projects."
          set +e
          project_list_output="$(npx wrangler pages project list 2>&1)"
          project_list_status=$?
          set -e

          if [ "${project_list_status}" -ne 0 ]; then
            echo "CLOUDFLARE_PROJECT_READY=false" >> "$GITHUB_ENV"
            echo "${project_list_output}" | sed -E 's/[A-Za-z0-9_-]{30,}/[redacted]/g'
            echo "::error::Unable to list Cloudflare Pages projects. Check whether CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN are valid for the intended Cloudflare account."
            exit 1
          fi

          accessible_projects="$(printf '%s\n' "${project_list_output}" | extract_project_names || true)"

          if [ -z "${accessible_projects}" ]; then
            echo "::warning::No Pages project names could be parsed from Wrangler output."
          else
            echo "Accessible Pages project names:"
            printf '%s\n' "${accessible_projects}" | sed 's/^/- /'
          fi

          if printf '%s\n' "${accessible_projects}" | exact_project_match "${CLOUDFLARE_PROJECT_NAME}"; then
            echo "Cloudflare Pages project '${CLOUDFLARE_PROJECT_NAME}' exists and exactly matches an accessible project."
            echo "CLOUDFLARE_PROJECT_READY=true" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "::warning::No exact Cloudflare Pages project match found for '${CLOUDFLARE_PROJECT_NAME}'."

          if [ "${AUTO_CREATE_CLOUDFLARE_PROJECT}" = "true" ]; then
            echo "AUTO_CREATE_CLOUDFLARE_PROJECT=true, attempting to create Pages project '${CLOUDFLARE_PROJECT_NAME}'."
            npx wrangler pages project create "${CLOUDFLARE_PROJECT_NAME}" --production-branch main
            echo "Re-checking accessible Cloudflare Pages projects after create."

            project_list_after_create="$(npx wrangler pages project list 2>&1)"
            accessible_projects_after_create="$(printf '%s\n' "${project_list_after_create}" | extract_project_names || true)"
            if [ -n "${accessible_projects_after_create}" ]; then
              echo "Accessible Pages project names after create:"
              printf '%s\n' "${accessible_projects_after_create}" | sed 's/^/- /'
            fi

            if printf '%s\n' "${accessible_projects_after_create}" | exact_project_match "${CLOUDFLARE_PROJECT_NAME}"; then
              echo "Cloudflare Pages project '${CLOUDFLARE_PROJECT_NAME}' now exists and exactly matches an accessible project."
              echo "CLOUDFLARE_PROJECT_READY=true" >> "$GITHUB_ENV"
            else
              echo "CLOUDFLARE_PROJECT_READY=false" >> "$GITHUB_ENV"
              echo "::error::Cloudflare Pages project '${CLOUDFLARE_PROJECT_NAME}' was not visible after auto-create. Check CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_API_TOKEN scope, and CLOUDFLARE_PROJECT_NAME."
              exit 1
            fi
          else
            echo "CLOUDFLARE_PROJECT_READY=false" >> "$GITHUB_ENV"
            echo "::error::Cloudflare Pages project '${CLOUDFLARE_PROJECT_NAME}' does not exactly match any accessible Pages project. Accessible projects were: ${accessible_projects//$'\n'/, }. Check CLOUDFLARE_PROJECT_NAME, CLOUDFLARE_ACCOUNT_ID, and CLOUDFLARE_API_TOKEN. Set CLOUDFLARE_PROJECT_NAME to one of the listed project names, fix the account/token, or set AUTO_CREATE_CLOUDFLARE_PROJECT=true to create the configured project."
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        if: ${{ success() && env.EFFECTIVE_DEPLOY == 'true' && env.DEPLOY_READY == 'true' && env.CLOUDFLARE_PROJECT_READY == 'true' }}
        run: npx wrangler pages deploy "$BUILD_OUTPUT_DIR" --project-name "$CLOUDFLARE_PROJECT_NAME" --branch "$GITHUB_REF_NAME"

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tiny-dream-news-${{ env.RUN_DATE || github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            data/runtime/*.json
            data/runtime/*.log
            data/daily/latest.json
            data/archive/*.json
            data/logs/*.log
